interface:
  display_name: "Codex Impact 발표자료"
  short_description: "워크숍 3분 발표자료를 최종 Google Slides 템플릿에 자동 채움"
  brand_color: "#2561D9"
  default_prompt: "Use $codex-impact-presentation to create a 3-minute Codex Impact Workshop presentation from the participant input folder. Before copying the Google Slides template, first ask for explicit approval to upload presentation text/images to Google Slides and ask whether the user can provide presentation-assets/result_screenshot.png for slide 2. Do not create a Slides copy until upload approval is granted and the user either provides the screenshot or explicitly says slide 2 can be left blank. Generate only one final image per missing image slot when needed; do not create multiple candidates, blur images, compare candidates, or loop on regeneration unless the first image is clearly unusable. Then fill a copy of the final Google Slides template. Do not use legacy PPTX outputs."
policy:
  allow_implicit_invocation: true
